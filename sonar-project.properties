sonar.projectKey=Insaner1980_dBcheck
sonar.organization=insaner1980

sonar.sources=app/src/main/java
sonar.java.binaries=app/build/intermediates/javac/debug/classes,app/build/tmp/kotlin-classes/debug

# Exclude generated files and Android binary assets from all analysis
