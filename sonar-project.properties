sonar.projectKey=Insaner1980_dBcheck
sonar.organization=insaner1980

sonar.sources=app/src/main/java
sonar.java.binaries=app/build/intermediates/classes/debug/transformDebugClassesWithAsm/dirs

# Exclude generated files from all analysis
sonar.exclusions=**/build/**,**/generated/**,**/*Generated*.kt

# Exclude generated files from duplication analysis
sonar.cpd.exclusions=**/build/**,**/generated/**

# Coverage mitataan yksikkotestattavasta sovelluslogiikasta.
# Compose UI, Android entrypointit ja ulkoisten SDK:iden gatewayt validoidaan muilla tarkistuksilla.
sonar.coverage.exclusions=\
  **/build/**,\
  **/generated/**,\
  **/ui/**,\
  **/widget/**,\
  **/MainActivity.kt,\
  **/DbCheckApplication.kt,\
  **/di/**,\
  **/util/ExportPdfReportUseCase.kt,\
  **/util/PdfChartRenderer.kt,\
  **/util/HapticFeedbackHelper.kt,\
  **/domain/audio/AudioEngine.kt,\
  **/domain/audio/AndroidToneAudioTrack.kt,\
  **/sync/HealthConnectManager.kt,\
  **/service/MeasurementForegroundService.kt,\
  **/billing/BillingManager.kt,\
  **/service/NotificationHelper.kt,\
  **/data/export/ExportCsvUseCase.kt,\
  **/data/local/preferences/UserPreferencesDataStore.kt,\
  **/data/repository/SessionRepository.kt
sonar.coverage.jacoco.xmlReportPaths=**/build/reports/jacoco/debugUnitTest/jacocoDebugUnitTestReport.xml
