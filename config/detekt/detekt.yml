complexity:
  LongMethod:
    allowedLines: 80
  LongParameterList:
    allowedFunctionParameters: 10
    allowedConstructorParameters: 10
  TooManyFunctions:
    allowedFunctionsPerFile: 30
    allowedFunctionsPerClass: 25

style:
  MagicNumber:
    active: false
  MaxLineLength:
    maxLineLength: 120
  WildcardImport:
    active: false
  UnusedPrivateClass:
    active: true
  UnusedPrivateFunction:
    active: true
  UnusedPrivateProperty:
    active: true

naming:
  FunctionNaming:
    # Compose-funktiot alkavat isolla kirjaimella
    excludes: ['**/ui/**']
  TopLevelPropertyNaming:
    constantPattern: '[A-Za-z][_A-Za-z0-9]*'

# Detektin ktlint-wrapper tuo ktlint-saannot, mutta ktlintin oletussisennys
# ei vastaa Android Studion taman koodipohjan automaattiformatointia.
# Puhtaasti tyylilliset formatointisaannot poistetaan kaytosta; IDE-formatointi on totuuden lahde.
ktlint:
  Indentation:
    active: false
  ArgumentListWrapping:
    active: false
  MaximumLineLength:
    maxLineLength: 160
