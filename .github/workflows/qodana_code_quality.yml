name: Qodana
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: # Specify your branches here
      - main # The 'main' branch
      - 'releases/*' # The release branches

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # Lukittu versioon v4.3.1.
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}  # Tarkistaa PR:n head-commitin tai push-commitin.
          fetch-depth: 0  # Full history is required for pull request analysis.
      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@d7b5ec2fbec32197ef447c450e00589ed5f34fd5 # Lukittu versioon v2026.1.0.
        # Qodana 2026.1 tukee Android-importissa enintaan AGP 9.0.0-alpha06; raportoi, mutta ala blokkaa AGP 9.1.0 -PR:ia.
        continue-on-error: true
        with:
          pr-mode: false
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_706806546 }}
          QODANA_ENDPOINT: 'https://qodana.cloud'
