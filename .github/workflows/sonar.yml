name: SonarCloud

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # Lukittu versioon v6.0.3.
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # Lukittu versioon v5.3.0.
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # Lukittu versioon v4.0.1.
        with:
          packages: platform-tools platforms;android-37.0

      - name: Check Sonar token
        id: sonar-token
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "$SONAR_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ] && [ "$GITHUB_ACTOR" = "dependabot[bot]" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "SONAR_TOKEN ei ole Dependabotin pull requestissa saatavilla; SonarCloud-skannaus ohitetaan."
            exit 0
          fi
          echo "SONAR_TOKEN puuttuu, mutta ajo ei ole Dependabotin pull request." >&2
          exit 1

      - name: Build, test, and scan with Gradle
        if: steps.sonar-token.outputs.available == 'true'
        run: ./gradlew assembleDebug jacocoDebugUnitTestReport sonar --no-daemon --console=plain
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Skip SonarCloud scan for Dependabot
        if: steps.sonar-token.outputs.available == 'false'
        run: echo "SonarCloud-skannaus ohitettiin, koska Dependabot ei saa GitHub Actions -secreteja."
