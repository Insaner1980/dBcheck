name: SonarCloud

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # Lukittu versioon v4.3.1.
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # Lukittu versioon v4.8.0.
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # Lukittu versioon v3.2.2.

      - name: Build, test, and scan with Gradle
        run: ./gradlew assembleDebug jacocoDebugUnitTestReport sonar --no-daemon --console=plain
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
