name: Security Analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 8 * * 1'

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep:1.162.0@sha256:9349edbadf90c3f3c0c3f55867625354e89680e6fa10d9034042af52fdb0e0d0
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # Lukittu versioon v4.3.1.
      - run: >
          semgrep scan
          --error
          --metrics=off
          --quiet
          --config config/semgrep/dbcheck-security.yml
          --exclude app/build
          --exclude build
          --exclude reports
          --disable-version-check
          --sarif
          --output semgrep.sarif
          .
      - uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # Lukittu versioon v4.35.4.
        if: always() && hashFiles('semgrep.sarif') != ''
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # Lukittu versioon v4.3.1.

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # Lukittu versioon v4.8.0.
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # Lukittu versioon v3.2.2.

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # Lukittu versioon v4.4.4.

      - name: Set Dependency-Check cache week
        id: dependency-check-cache
        run: echo "week=$(date -u +'%G-W%V')" >> "$GITHUB_OUTPUT"

      - name: Cache OWASP Dependency-Check data
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # Lukittu versioon v5.0.5.
        with:
          path: .gradle/dependency-check-data
          key: ${{ runner.os }}-dependency-check-data-${{ steps.dependency-check-cache.outputs.week }}
          restore-keys: |
            ${{ runner.os }}-dependency-check-data-

      - name: OWASP Dependency-Check
        run: ./gradlew :app:dependencyCheckAnalyze --no-daemon --no-configuration-cache --console=plain
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          DEPENDENCY_CHECK_AUTO_UPDATE: 'true'
          DEPENDENCY_CHECK_DATA_DIRECTORY: ${{ github.workspace }}/.gradle/dependency-check-data

      - uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # Lukittu versioon v4.35.4.
        if: always() && hashFiles('reports/dependency-check-report.sarif') != ''
        with:
          sarif_file: reports/dependency-check-report.sarif
          category: owasp-dependency-check
