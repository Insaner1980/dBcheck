name: Security Analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 8 * * 1'

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep:1.162.0@sha256:9349edbadf90c3f3c0c3f55867625354e89680e6fa10d9034042af52fdb0e0d0
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # Lukittu versioon v6.0.3.
      - run: >
          semgrep scan
          --error
          --metrics=off
          --quiet
          --config config/semgrep/dbcheck-security.yml
          --exclude app/build
          --exclude build
          --exclude reports
          --disable-version-check
          --sarif
          --output semgrep.sarif
          .
      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # Lukittu versioon v4.36.2.
        if: always() && hashFiles('semgrep.sarif') != ''
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: OWASP Dependency-Check skipped in GitHub Actions
        run: |
          echo "OWASP Dependency-Check ajetaan paikallisesti security-check/sc-skriptilla."
          echo "GitHub Actionsissa tama check pidetaan nopeana onnistuvana porttina, jotta PR:t eivat odota hidasta NVD-synkkausta."
