name: Android Release Build

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main", "releases/*" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-build:
    name: Release APK and bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # Lukittu versioon v6.0.3.

      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # Lukittu versioon v5.3.0.
        with:
          java-version: '21'
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # Lukittu versioon v4.0.1.
        with:
          packages: |
            platform-tools
            platforms;android-37

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # Lukittu versioon v6.1.0.

      - name: Decode release keystore
        if: github.event_name != 'pull_request'
        env:
          DBCHECK_RELEASE_KEYSTORE_BASE64: ${{ secrets.DBCHECK_RELEASE_KEYSTORE_BASE64 }}
          DBCHECK_RELEASE_STORE_PASSWORD: ${{ secrets.DBCHECK_RELEASE_STORE_PASSWORD }}
          DBCHECK_RELEASE_KEY_ALIAS: ${{ secrets.DBCHECK_RELEASE_KEY_ALIAS }}
          DBCHECK_RELEASE_KEY_PASSWORD: ${{ secrets.DBCHECK_RELEASE_KEY_PASSWORD }}
        run: |
          if [ -z "$DBCHECK_RELEASE_KEYSTORE_BASE64" ] || \
             [ -z "$DBCHECK_RELEASE_STORE_PASSWORD" ] || \
             [ -z "$DBCHECK_RELEASE_KEY_ALIAS" ] || \
             [ -z "$DBCHECK_RELEASE_KEY_PASSWORD" ]; then
            echo "Release signing secrets not configured; unsigned release build will be validated."
            exit 0
          fi
          echo "$DBCHECK_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/dbcheck-release.jks"
          echo "DBCHECK_RELEASE_STORE_FILE=$RUNNER_TEMP/dbcheck-release.jks" >> "$GITHUB_ENV"
          echo "DBCHECK_RELEASE_SIGNING_CONFIGURED=true" >> "$GITHUB_ENV"

      - name: Build unsigned release APK and bundle for PR
        if: github.event_name == 'pull_request'
        run: ./gradlew :app:assembleRelease :app:bundleRelease --no-daemon

      - name: Build release APK and bundle
        if: github.event_name != 'pull_request'
        run: ./gradlew :app:assembleRelease :app:bundleRelease --no-daemon
        env:
          DBCHECK_RELEASE_STORE_PASSWORD: ${{ secrets.DBCHECK_RELEASE_STORE_PASSWORD }}
          DBCHECK_RELEASE_KEY_ALIAS: ${{ secrets.DBCHECK_RELEASE_KEY_ALIAS }}
          DBCHECK_RELEASE_KEY_PASSWORD: ${{ secrets.DBCHECK_RELEASE_KEY_PASSWORD }}

      - name: Verify signed release artifacts
        run: |
          if [ "${DBCHECK_RELEASE_SIGNING_CONFIGURED:-}" != "true" ]; then
            echo "Release signing secrets not configured; unsigned release build was validated."
            exit 0
          fi
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -n 1)"
          "$APKSIGNER" verify --print-certs app/build/outputs/apk/release/app-release.apk
          jarsigner -verify app/build/outputs/bundle/release/app-release.aab
