name: Qodana

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  qodana:
    name: Qodana Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # Lukittu versioon v6.0.3.
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Qodana Scan
        uses: JetBrains/qodana-action@107939d10e5ddbffb88bc5dd279934314937ed7a # Lukittu versioon v2026.1.3.
        # Qodana 2026.1 tukee Android-importissa enintaan AGP 9.0.0-alpha06; raportoi, mutta ala blokkaa AGP 9.1.0 -PR:ia.
        continue-on-error: true
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
