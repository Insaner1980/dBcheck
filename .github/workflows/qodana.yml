name: Qodana

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  qodana:
    name: Qodana Analysis (non-blocking AGP 9.3 risk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # Lukittu versioon v6.0.3.
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Qodana Scan
        uses: JetBrains/qodana-action@4861e015da555e86a72b862892aba6c2b93e6891 # Lukittu versioon v2026.1.3.
        # Qodana/AGP 9.3.0 -yhteensopivuus pidetaan viela ei-blokkaavana; raportoi, mutta ala blokkaa PR:ia.
        continue-on-error: true
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}

      - name: Record Qodana compatibility risk
        if: always()
        run: |
          {
            echo "### Qodana compatibility"
            echo "- Qodana on ei-blokkaava AGP 9.3.0 -yhteensopivuusriski."
            echo "- Katso docs/qa/qodana-ci-compatibility.md ennen continue-on-error-asetuksen poistamista."
          } >> "$GITHUB_STEP_SUMMARY"
