name: Android Static Checks

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-check:
    name: lint-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # Lukittu versioon v4.3.1.

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # Lukittu versioon v4.8.0.
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # Lukittu versioon v3.2.2.

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # Lukittu versioon v4.4.4.

      - name: Run lint-check equivalent
        # Sama tarkistusjoukko kuin paikallinen lc/lint-check: ktlintCheck, detekt ja Android Lint.
        run: ./gradlew :app:ktlintCheck :app:detekt :app:lint --no-daemon --console=plain
