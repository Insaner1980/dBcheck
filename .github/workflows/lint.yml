name: Android Static Checks

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-check:
    name: lint-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # Lukittu versioon v6.0.3.

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # Lukittu versioon v5.3.0.
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # Lukittu versioon v4.0.1.
        with:
          packages: platform-tools platforms;android-37.0

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # Lukittu versioon v6.1.0.

      - name: Run lint-check equivalent
        # Sama tarkistusjoukko kuin paikallinen lc/lint-check: ktlintCheck, detekt ja Android Lint.
        run: ./gradlew :app:ktlintCheck :app:detekt :app:lint --no-daemon --console=plain
