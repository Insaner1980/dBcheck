name: Android Static Checks

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-check:
    name: lint-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # Lukittu versioon v6.0.3.

      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # Lukittu versioon v5.3.0.
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # Lukittu versioon v4.0.1.
        with:
          packages: platform-tools

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # Lukittu versioon v6.1.0.

      - name: Run lint-check equivalent
        # Sama tarkistusjoukko kuin paikallinen lc/lint-check: ktlintCheck, detekt ja Android Lint.
        run: ./gradlew :app:ktlintCheck :app:detekt :app:lint --no-daemon --console=plain
