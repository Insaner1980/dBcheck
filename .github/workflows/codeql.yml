name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  analyze:
    name: Analyze (Java/Kotlin)
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      CODEQL_BUNDLE_PATH: ${{ runner.temp }}/codeql-bundle-20260724-linux64.tar.zst
      CODEQL_BUNDLE_SHA256: 5bbf89fc9e818dbb45502c6697fe5806a17b868fba802f6e27e91110f84036b5
      CODEQL_BUNDLE_URL: https://github.com/dsp-testing/codeql-cli-nightlies/releases/download/codeql-bundle-20260724/codeql-bundle-linux64.tar.zst

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # Lukittu versioon v7.0.1.
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # Lukittu versioon v5.6.0.
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # Lukittu versioon v4.0.1.
        with:
          packages: platform-tools platforms;android-37.0

      - name: Download verified CodeQL bundle
        shell: bash
        run: |
          curl --fail --location --retry 3 --output "$CODEQL_BUNDLE_PATH" "$CODEQL_BUNDLE_URL"
          echo "$CODEQL_BUNDLE_SHA256  $CODEQL_BUNDLE_PATH" | sha256sum --check --strict

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # Lukittu versioon v4.37.3.
        with:
          languages: java-kotlin
          build-mode: manual
          # CodeQL 2.26.1 ei tue Kotlin 2.4.10:tä. Poista pin, kun vakaa bundle sisältää tuen.
          tools: ${{ env.CODEQL_BUNDLE_PATH }}

      - name: Build with Gradle
        run: ./gradlew assembleDebug --no-daemon

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # Lukittu versioon v4.37.3.
        with:
          category: "/language:java-kotlin"
