<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>dBcheck - Noise Level Meter</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#466906",
                        "surface-bright": "#f9f9f9",
                        "inverse-on-surface": "#9c9d9d",
                        "secondary-container": "#ffdcc5",
                        "tertiary-container": "#ffffff",
                        "surface-container-highest": "#e0e3e4",
                        "surface-dim": "#d7dbdb",
                        "on-background": "#2f3334",
                        "on-surface": "#2f3334",
                        "error-container": "#fa7150",
                        "on-tertiary": "#fbf8f8",
                        "primary-dim": "#3c5c00",
                        "secondary": "#954b00",
                        "on-tertiary-fixed-variant": "#6e6d6d",
                        "on-surface-variant": "#5c6060",
                        "error": "#aa371c",
                        "on-tertiary-container": "#636262",
                        "on-primary": "#efffd1",
                        "background": "#f9f9f9",
                        "inverse-primary": "#cbf788",
                        "error-dim": "#821a01",
                        "outline": "#777b7c",
                        "outline-variant": "#afb2b3",
                        "on-secondary": "#fff7f4",
                        "on-primary-fixed": "#2d4700",
                        "surface-variant": "#e0e3e4",
                        "on-secondary-container": "#814000",
                        "tertiary-fixed": "#ffffff",
                        "tertiary-dim": "#535353",
                        "tertiary-fixed-dim": "#f3f0f0",
                        "on-tertiary-fixed": "#505050",
                        "on-error": "#fff7f6",
                        "surface": "#f9f9f9",
                        "tertiary": "#5f5f5f",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#c5f183",
                        "on-secondary-fixed": "#653100",
                        "secondary-fixed": "#ffdcc5",
                        "primary-container": "#c5f183",
                        "on-primary-fixed-variant": "#436501",
                        "surface-container-high": "#e6e8e9",
                        "inverse-surface": "#0c0f0f",
                        "on-secondary-fixed-variant": "#904800",
                        "surface-tint": "#466906",
                        "surface-container": "#eceeee",
                        "secondary-dim": "#834100",
                        "on-error-container": "#671200",
                        "primary-fixed-dim": "#b7e277",
                        "secondary-fixed-dim": "#ffcaa6",
                        "surface-container-low": "#f3f4f4",
                        "on-primary-container": "#3b5b00"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-noise {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
        }
        .waveform-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 0;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased overflow-hidden">
<!-- Top AppBar (from JSON) -->
<header class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-xl flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-zinc-800" data-icon="graphic_eq">graphic_eq</span>
<h1 class="font-manrope font-bold tracking-tight text-zinc-800 text-xl font-extrabold tracking-tighter">dBcheck</h1>
</div>
<button class="hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined text-zinc-800" data-icon="settings">settings</span>
</button>
</header>
<main class="relative h-screen flex flex-col items-center justify-center px-8 pt-16 pb-32 overflow-hidden">
<!-- Faint Translucent Waveform Background -->
<div class="absolute inset-0 pointer-events-none flex items-center justify-center opacity-30 px-4">
<svg class="w-full h-auto max-w-4xl" preserveaspectratio="none" viewbox="0 0 1000 200">
<path class="waveform-path" d="M0,100 Q50,20 100,100 T200,100 T300,100 T400,100 T500,100 T600,100 T700,100 T800,100 T900,100 T1000,100" fill="none" stroke="url(#waveGradient)" stroke-width="1.5"></path>
<defs>
<lineargradient id="waveGradient" x1="0%" x2="100%" y1="0%" y2="0%">
<stop offset="0%" style="stop-color:theme('colors.tertiary-fixed-dim');"></stop>
<stop offset="50%" style="stop-color:theme('colors.primary');"></stop>
<stop offset="100%" style="stop-color:theme('colors.tertiary-fixed-dim');"></stop>
</lineargradient>
</defs>
</svg>
</div>
<!-- Meter Section -->
<div class="relative z-10 flex flex-col items-center w-full max-w-md">
<!-- Large Elegant Circular Ring -->
<div class="relative flex items-center justify-center w-72 h-72 md:w-80 md:h-80 rounded-full bg-surface-container-lowest shadow-[0_24px_48px_rgba(0,0,0,0.02)] border-[0.5px] border-outline-variant/10">
<!-- Soft Muted Gradient Ring -->
<svg class="absolute inset-0 w-full h-full -rotate-90 p-2">
<circle cx="50%" cy="50%" fill="none" r="46%" stroke="#f3f4f4" stroke-linecap="round" stroke-width="8"></circle>
<circle class="drop-shadow-[0_0_12px_rgba(70,105,6,0.15)]" cx="50%" cy="50%" fill="none" r="46%" stroke="url(#meterGradient)" stroke-dasharray="290" stroke-dashoffset="100" stroke-linecap="round" stroke-width="8"></circle>
<defs>
<lineargradient id="meterGradient" x1="0%" x2="100%" y1="0%" y2="0%">
<stop offset="0%" style="stop-color:theme('colors.primary');"></stop>
<stop offset="100%" style="stop-color:theme('colors.secondary');"></stop>
</lineargradient>
</defs>
</svg>
<div class="text-center">
<div class="flex items-baseline justify-center gap-1">
<span class="text-6xl md:text-7xl font-bold text-on-surface tracking-tight">63</span>
<span class="text-xl font-semibold text-on-surface-variant">dB</span>
</div>
<p class="mt-2 text-sm font-medium text-on-surface-variant tracking-wide">Normal conversation</p>
</div>
</div>
<!-- Stats Row -->
<div class="mt-12 w-full grid grid-cols-3 gap-4">
<div class="bg-surface-container-low rounded-xl px-4 py-4 flex flex-col items-center justify-center">
<span class="text-[10px] font-bold uppercase tracking-[0.1em] text-on-surface-variant mb-1">MIN</span>
<span class="text-lg font-bold text-on-surface">32 <span class="text-xs font-normal">dB</span></span>
</div>
<div class="bg-surface-container-low rounded-xl px-4 py-4 flex flex-col items-center justify-center">
<span class="text-[10px] font-bold uppercase tracking-[0.1em] text-on-surface-variant mb-1">AVG</span>
<span class="text-lg font-bold text-on-surface">58 <span class="text-xs font-normal">dB</span></span>
</div>
<div class="bg-surface-container-low rounded-xl px-4 py-4 flex flex-col items-center justify-center">
<span class="text-[10px] font-bold uppercase tracking-[0.1em] text-on-surface-variant mb-1">MAX</span>
<span class="text-lg font-bold text-on-surface">84 <span class="text-xs font-normal">dB</span></span>
</div>
</div>
<!-- Controls -->
<div class="mt-16 flex items-center justify-center gap-8 w-full">
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-high text-on-surface hover:opacity-80 transition-all active:scale-90">
<span class="material-symbols-outlined" data-icon="refresh">refresh</span>
</button>
<button class="w-20 h-20 flex items-center justify-center rounded-full bg-gradient-to-br from-primary to-secondary text-on-primary shadow-xl shadow-primary/20 hover:opacity-90 transition-all active:scale-95 group">
<span class="material-symbols-outlined text-4xl" data-icon="pause" style="font-variation-settings: 'FILL' 1;">pause</span>
</button>
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-high text-on-surface hover:opacity-80 transition-all active:scale-90">
<span class="material-symbols-outlined" data-icon="share">share</span>
</button>
</div>
</div>
</main>
<!-- BottomNavBar (from JSON) -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-8 pt-4 bg-white z-50 rounded-t-[2rem] shadow-[0_-4px_24px_rgba(0,0,0,0.04)]">
<!-- Meter Tab (Active) -->
<a class="flex flex-col items-center justify-center text-zinc-900 bg-zinc-100 rounded-2xl px-5 py-2 scale-90 duration-300 ease-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="speed" style="font-variation-settings: 'FILL' 1;">speed</span>
<span class="font-manrope text-[11px] font-medium tracking-wide uppercase">Meter</span>
</a>
<!-- Analytics Tab -->
<a class="flex flex-col items-center justify-center text-zinc-400 px-5 py-2 hover:text-zinc-600 transition-opacity" href="#">
<span class="material-symbols-outlined mb-1" data-icon="insights">insights</span>
<span class="font-manrope text-[11px] font-medium tracking-wide uppercase">Analytics</span>
</a>
<!-- History Tab -->
<a class="flex flex-col items-center justify-center text-zinc-400 px-5 py-2 hover:text-zinc-600 transition-opacity" href="#">
<span class="material-symbols-outlined mb-1" data-icon="history">history</span>
<span class="font-manrope text-[11px] font-medium tracking-wide uppercase">History</span>
</a>
<!-- Tests Tab -->
<a class="flex flex-col items-center justify-center text-zinc-400 px-5 py-2 hover:text-zinc-600 transition-opacity" href="#">
<span class="material-symbols-outlined mb-1" data-icon="quiz">quiz</span>
<span class="font-manrope text-[11px] font-medium tracking-wide uppercase">Tests</span>
</a>
</nav>
<!-- Visual Polish: Grain Overlay -->
<div class="fixed inset-0 pointer-events-none bg-noise z-[60]"></div>
</body></html>
