<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>dBcheck - Hearing Test Active</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Space_Grotesk:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary": "#4f6700",
              "on-primary-fixed-variant": "#506900",
              "on-primary-container": "#485e00",
              "on-secondary": "#4f5600",
              "surface-container-low": "#131313",
              "surface-container-high": "#201f1f",
              "on-secondary-fixed-variant": "#596000",
              "secondary-fixed-dim": "#d0dd54",
              "surface-container": "#1a1919",
              "on-tertiary-container": "#594a00",
              "on-tertiary-fixed-variant": "#645300",
              "background": "#0e0e0e",
              "primary-container": "#c5fe00",
              "on-error": "#450900",
              "tertiary-fixed-dim": "#edc600",
              "surface-dim": "#0e0e0e",
              "outline-variant": "#494847",
              "tertiary": "#ffe483",
              "primary-fixed-dim": "#b9ef00",
              "surface-variant": "#262626",
              "on-tertiary-fixed": "#433700",
              "tertiary-container": "#fdd400",
              "surface-container-lowest": "#000000",
              "primary-fixed": "#c5fe00",
              "inverse-on-surface": "#565554",
              "surface-container-highest": "#262626",
              "surface-tint": "#f3ffcd",
              "surface-bright": "#2c2c2c",
              "secondary": "#dfec60",
              "on-error-container": "#ffd2c8",
              "error-dim": "#d53d18",
              "on-secondary-fixed": "#3d4300",
              "error": "#ff7351",
              "on-secondary-container": "#f6ff9c",
              "inverse-surface": "#fcf8f8",
              "on-primary-fixed": "#384b00",
              "error-container": "#b92902",
              "on-tertiary": "#635200",
              "secondary-fixed": "#dfec60",
              "surface": "#0e0e0e",
              "tertiary-dim": "#edc600",
              "inverse-primary": "#4f6700",
              "on-surface": "#ffffff",
              "outline": "#777575",
              "secondary-dim": "#d0dd54",
              "primary": "#f3ffcd",
              "on-surface-variant": "#adaaaa",
              "secondary-container": "#5b6300",
              "primary-dim": "#b9ef00",
              "tertiary-fixed": "#fdd400",
              "on-background": "#ffffff"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Manrope"],
              "label": ["Space Grotesk"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pulse-ring {
            box-shadow: 0 0 40px rgba(185, 239, 0, 0.15);
        }
        .waveform-bar {
            transition: height 0.3s ease;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container overflow-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#0e0e0e] flex items-center justify-between px-6 h-16 shadow-[0px_4px_24px_rgba(185,239,0,0.04)]">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#C6FF00]" data-icon="graphic_eq">graphic_eq</span>
<span class="font-['Manrope'] font-bold tracking-tight text-xl font-black text-[#C6FF00] tracking-widest uppercase">dBcheck</span>
</div>
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-[#201f1f] transition-colors text-[#adaaaa] active:scale-95 duration-200">
<span class="material-symbols-outlined">close</span>
</button>
</div>
</header>
<main class="relative h-screen pt-16 pb-20 flex flex-col items-center justify-center overflow-hidden">
<!-- Subtle Waveform Background -->
<div class="absolute inset-0 flex items-center justify-around px-8 opacity-10 pointer-events-none">
<div class="waveform-bar w-1 bg-primary-container h-32 rounded-full"></div>
<div class="waveform-bar w-1 bg-primary-container h-48 rounded-full"></div>
<div class="waveform-bar w-1 bg-primary-container h-24 rounded-full"></div>
<div class="waveform-bar w-1 bg-primary-container h-56 rounded-full"></div>
<div class="waveform-bar w-1 bg-primary-container h-36 rounded-full"></div>
<div class="waveform-bar w-1 bg-primary-container h-44 rounded-full"></div>
<div class="waveform-bar w-1 bg-primary-container h-28 rounded-full"></div>
<div class="waveform-bar w-1 bg-primary-container h-64 rounded-full"></div>
<div class="waveform-bar w-1 bg-primary-container h-40 rounded-full"></div>
<div class="waveform-bar w-1 bg-primary-container h-52 rounded-full"></div>
</div>
<!-- Progress Tracking Header -->
<div class="absolute top-24 w-full px-8 flex flex-col items-center gap-3">
<div class="flex justify-between w-full max-w-md items-end">
<span class="font-label text-xs tracking-widest text-on-surface-variant uppercase">Phase 03 of 12</span>
<span class="font-label text-xs tracking-widest text-primary-fixed uppercase font-bold">Left Ear Only</span>
</div>
<div class="w-full max-w-md h-1 bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full w-[25%] bg-gradient-to-r from-primary to-secondary"></div>
</div>
</div>
<!-- Pulse Meter (Signature Component) -->
<div class="relative flex flex-col items-center justify-center">
<!-- Breathing Outer Glows -->
<div class="absolute w-[320px] h-[320px] rounded-full bg-primary-container/5 blur-3xl"></div>
<!-- Main Circular Container -->
<div class="relative w-72 h-72 rounded-full border border-primary/20 backdrop-blur-xl bg-surface-variant/40 flex items-center justify-center pulse-ring">
<!-- Inner Animated Progress Ring (SVG) -->
<svg class="absolute inset-0 w-full h-full -rotate-90">
<circle class="text-surface-container-highest" cx="144" cy="144" fill="transparent" r="140" stroke="currentColor" stroke-width="2"></circle>
<circle cx="144" cy="144" fill="transparent" r="140" stroke="url(#meterGradient)" stroke-dasharray="880" stroke-dashoffset="660" stroke-linecap="round" stroke-width="4"></circle>
<defs>
<lineargradient id="meterGradient" x1="0%" x2="100%" y1="0%" y2="0%">
<stop offset="0%" style="stop-color:#f3ffcd"></stop>
<stop offset="100%" style="stop-color:#dfec60"></stop>
</lineargradient>
</defs>
</svg>
<div class="text-center z-10">
<span class="block font-label text-[10px] tracking-[0.3em] text-on-surface-variant uppercase mb-2">Testing</span>
<div class="flex items-baseline justify-center gap-1">
<span class="font-headline font-extrabold text-5xl text-on-surface tracking-tighter">1000</span>
<span class="font-label text-lg text-primary-fixed-dim">Hz</span>
</div>
</div>
</div>
<div class="mt-12 text-center max-w-xs">
<p class="font-body text-on-surface-variant text-sm leading-relaxed">
                    Focus on the subtle tones. Tap as soon as you detect the sound in your left ear.
                </p>
</div>
</div>
<!-- Response Actions -->
<div class="absolute bottom-28 w-full px-6 flex flex-col gap-4 max-w-md">
<button class="w-full py-5 rounded-xl bg-gradient-to-r from-primary to-secondary text-on-primary-fixed font-headline font-bold text-lg shadow-[0px_8px_32px_rgba(185,239,0,0.2)] active:scale-95 transition-transform">
                I HEAR IT
            </button>
<button class="w-full py-5 rounded-xl bg-surface-container-highest border border-outline-variant/30 text-on-surface-variant font-headline font-bold text-lg active:scale-95 transition-transform">
                I DON'T HEAR IT
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 bg-[#0e0e0e]/60 backdrop-blur-xl border-t border-[#f3ffcd]/15 flex justify-around items-center h-20 pb-safe px-4 shadow-[0_-8px_24px_rgba(185,239,0,0.04)] rounded-t-2xl">
<a class="flex flex-col items-center justify-center text-[#adaaaa] px-4 py-1 hover:text-[#f3ffcd] transition-all active:scale-90 duration-300" href="#">
<span class="material-symbols-outlined mb-1" data-icon="speed">speed</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase tracking-widest">METER</span>
</a>
<a class="flex flex-col items-center justify-center bg-[#c5fe00] text-[#0e0e0e] rounded-xl px-4 py-1 font-bold active:scale-90 duration-300" href="#">
<span class="material-symbols-outlined mb-1" data-icon="hearing" style="font-variation-settings: 'FILL' 1;">hearing</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase tracking-widest">TESTS</span>
</a>
<a class="flex flex-col items-center justify-center text-[#adaaaa] px-4 py-1 hover:text-[#f3ffcd] transition-all active:scale-90 duration-300" href="#">
<span class="material-symbols-outlined mb-1" data-icon="leaderboard">leaderboard</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase tracking-widest">HISTORY</span>
</a>
<a class="flex flex-col items-center justify-center text-[#adaaaa] px-4 py-1 hover:text-[#f3ffcd] transition-all active:scale-90 duration-300" href="#">
<span class="material-symbols-outlined mb-1" data-icon="settings">settings</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase tracking-widest">SETTINGS</span>
</a>
</nav>
</body></html>
