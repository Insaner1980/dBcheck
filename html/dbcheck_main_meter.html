<!DOCTYPE html>

<style>.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24

    box-shadow: 0 0 40px rgba(197, 254, 0, 0.15)

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-surface font-body selection:bg-primary selection:text-on-primary">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#0e0e0e]/60 backdrop-blur-xl flex items-center justify-between px-6 py-4 w-full">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#f3ffcd]" data-icon="graphic_eq">graphic_eq</span>
<h1 class="text-[#f3ffcd] font-manrope font-extrabold tracking-tighter text-2xl">dBcheck</h1>
</div>
<button class="text-[#adaaaa] hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</header>
<main class="relative min-h-screen pt-24 pb-32 overflow-hidden flex flex-col items-center justify-center px-6">
<!-- Background Atmosphere -->
<div class="absolute inset-0 bg-noise pointer-events-none"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[150%] h-[150%] bg-[radial-gradient(circle_at_center,rgba(185,239,0,0.05)_0%,transparent_70%)] pointer-events-none"></div>
<!-- Faint Audio Waveform Visualization -->
<div class="absolute inset-0 flex items-center justify-center opacity-10 pointer-events-none px-4">
<div class="flex items-end gap-1 h-32 w-full max-w-md">
<div class="flex-1 bg-primary rounded-full h-1/4"></div>
<div class="flex-1 bg-primary rounded-full h-2/4"></div>
<div class="flex-1 bg-primary rounded-full h-3/4"></div>
<div class="flex-1 bg-primary rounded-full h-full"></div>
<div class="flex-1 bg-primary rounded-full h-4/5"></div>
<div class="flex-1 bg-primary rounded-full h-2/3"></div>
<div class="flex-1 bg-primary rounded-full h-1/2"></div>
<div class="flex-1 bg-primary rounded-full h-3/4"></div>
<div class="flex-1 bg-primary rounded-full h-full"></div>
<div class="flex-1 bg-primary rounded-full h-2/4"></div>
<div class="flex-1 bg-primary rounded-full h-1/3"></div>
<div class="flex-1 bg-primary rounded-full h-1/2"></div>
</div>
</div>
<!-- Signature Component: The Pulse Meter -->
<div class="relative z-10 flex flex-col items-center">
<div class="relative w-72 h-72 md:w-80 md:h-80 flex items-center justify-center">
<!-- Outer Glow Ring -->
<div class="absolute inset-0 rounded-full border-2 border-primary/20 pulse-glow"></div>
<!-- Main Glass Container -->
<div class="w-64 h-64 md:w-72 md:h-72 rounded-full bg-surface-variant/40 backdrop-blur-2xl flex flex-col items-center justify-center border border-outline-variant/15 relative overflow-hidden">
<!-- Gradient Progress Ring (Simulated) -->
<svg class="absolute inset-0 w-full h-full -rotate-90">
<circle class="text-primary/10" cx="50%" cy="50%" fill="none" r="48%" stroke="currentColor" stroke-dasharray="10 4" stroke-width="4"></circle>
<circle class="drop-shadow-[0_0_8px_rgba(197,254,0,0.5)]" cx="50%" cy="50%" fill="none" r="48%" stroke="url(#paint0_linear)" stroke-dasharray="280 1000" stroke-linecap="round" stroke-width="8"></circle>
<defs>
<lineargradient id="paint0_linear" x1="0" x2="1" y1="0" y2="1">
<stop stop-color="#f3ffcd"></stop>
<stop offset="1" stop-color="#dfec60"></stop>
</lineargradient>
</defs>
</svg>
<div class="text-center z-10">
<div class="font-label text-on-surface-variant text-sm tracking-[0.2em] mb-1">DECIBELS</div>
<div class="font-headline font-extrabold text-7xl md:text-8xl tracking-tight text-on-surface flex items-baseline justify-center">
                            63<span class="text-2xl font-label text-primary ml-1">dB</span>
</div>
<div class="mt-4 px-4 py-1.5 rounded-full bg-primary-container/10 border border-primary-container/20">
<span class="font-label text-[10px] uppercase tracking-widest text-primary font-bold">Normal conversation</span>
</div>
</div>
</div>
</div>
<!-- Stats Row -->
<div class="grid grid-cols-3 gap-8 mt-16 w-full max-w-sm">
<div class="flex flex-col items-center group cursor-default">
<span class="font-label text-[10px] tracking-widest text-on-surface-variant uppercase mb-2 group-hover:text-primary transition-colors">MIN</span>
<span class="font-label text-xl font-bold text-on-surface">32<span class="text-xs ml-1 opacity-40">dB</span></span>
</div>
<div class="flex flex-col items-center group cursor-default">
<span class="font-label text-[10px] tracking-widest text-on-surface-variant uppercase mb-2 group-hover:text-primary transition-colors">AVG</span>
<span class="font-label text-xl font-bold text-on-surface">58<span class="text-xs ml-1 opacity-40">dB</span></span>
</div>
<div class="flex flex-col items-center group cursor-default">
<span class="font-label text-[10px] tracking-widest text-on-surface-variant uppercase mb-2 group-hover:text-primary transition-colors">MAX</span>
<span class="font-label text-xl font-bold text-on-surface">84<span class="text-xs ml-1 opacity-40">dB</span></span>
</div>
</div>
</div>
<!-- Controls Section -->
<div class="mt-auto mb-12 flex items-center gap-8 z-10">
<button class="w-14 h-14 rounded-full bg-surface-container-high border border-outline-variant/15 flex items-center justify-center text-on-surface-variant hover:text-on-surface hover:bg-surface-container-highest transition-all active:scale-90">
<span class="material-symbols-outlined" data-icon="refresh">refresh</span>
</button>
<button class="w-20 h-20 rounded-full bg-gradient-to-br from-primary to-secondary flex items-center justify-center shadow-[0_0_24px_rgba(185,239,0,0.2)] active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[#384b00] text-4xl" data-icon="pause" data-weight="fill" style="font-variation-settings: 'FILL' 1;">pause</span>
</button>
<button class="w-14 h-14 rounded-full bg-surface-container-high border border-outline-variant/15 flex items-center justify-center text-on-surface-variant hover:text-on-surface hover:bg-surface-container-highest transition-all active:scale-90">
<span class="material-symbols-outlined" data-icon="share">share</span>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full flex justify-around items-center px-8 pb-8 pt-4 bg-[#201f1f]/60 backdrop-blur-lg rounded-t-[2rem] z-50 shadow-[0_-8px_24px_rgba(185,239,0,0.04)]">
<div class="flex items-center justify-center text-[#adaaaa] w-12 h-12 hover:text-[#f3ffcd] transition-colors active:scale-90 duration-150">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
</div>
<div class="flex items-center justify-center bg-gradient-to-br from-[#f3ffcd] to-[#dfec60] text-[#0e0e0e] rounded-full w-12 h-12 shadow-[0_0_12px_rgba(197,254,0,0.3)] active:scale-90 duration-150">
<span class="material-symbols-outlined" data-icon="mic" data-weight="fill" style="font-variation-settings: 'FILL' 1;">mic</span>
</div>
<div class="flex items-center justify-center text-[#adaaaa] w-12 h-12 hover:text-[#f3ffcd] transition-colors active:scale-90 duration-150">
<span class="material-symbols-outlined" data-icon="history">history</span>
</div>
</nav>
<!-- Overlay Details for Premium Feel -->
<div class="fixed left-6 top-1/2 -rotate-90 origin-left hidden lg:block opacity-30 pointer-events-none">
<span class="font-label text-[10px] tracking-[0.4em] uppercase text-on-surface">Atmospheric Depth Active</span>
</div>
<div class="fixed right-6 top-1/2 rotate-90 origin-right hidden lg:block opacity-30 pointer-events-none">
<span class="font-label text-[10px] tracking-[0.4em] uppercase text-on-surface">Frequency: 44.1kHz</span>
</div>
</body></html>
