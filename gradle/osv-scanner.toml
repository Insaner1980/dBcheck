# Nämä transitiivit tulevat Gradlen build-classpathista AGP:n ja build-työkalujen kautta.
# Appin lockfile skannataan erikseen, joten nämä poikkeukset koskevat vain gradle/-kansion
# verification-metadata.xml-tiedoston build-työkaluartefakteja.

[[PackageOverrides]]
name = "org.bitbucket.b_c:jose4j"
version = "0.9.5"
ecosystem = "Maven"
vulnerability.ignore = true

[[PackageOverrides]]
name = "org.bouncycastle:bcpkix-jdk18on"
version = "1.79"
ecosystem = "Maven"
vulnerability.ignore = true

[[PackageOverrides]]
name = "org.bouncycastle:bcprov-jdk18on"
version = "1.79"
ecosystem = "Maven"
vulnerability.ignore = true

[[PackageOverrides]]
name = "org.jdom:jdom2"
version = "2.0.6"
ecosystem = "Maven"
vulnerability.ignore = true

# OSV loytaa taman vain gradle/verification-metadata.xml:n build-tyokalumetadatasta.
# Korjaavia 2.x Jackson-versioita ei ole viela Maven Centralissa, joten poikkeus vanhenee
# Kotlinin seuraavan tooling-release-ikkunan jalkeen.
[[PackageOverrides]]
name = "com.fasterxml.jackson.core:jackson-databind"
version = "2.22.0"
ecosystem = "Maven"
vulnerability.ignore = true
effectiveUntil = 2026-10-01
reason = "CVE-2026-54515 koskee build-tyokalumetadatan Jacksonia; korjaavaa 2.x-versiota ei ole viela julkaistu."
